# Runs unit tests (Vitest) and the full Playwright e2e suite on every push
# and pull request.
#
# Runner choice: macos-14. Empirically the only free-tier runner where
# Chromium's Metal-via-ANGLE WebGPU path actually works — synth completes
# in ~10s here. Ubuntu + Mesa lavapipe (software Vulkan) was tried and is
# too slow for compute-heavy transformer inference (every synth test times
# out). Without real GPU, Kokoro falls back to WASM which is 10-30× slower
# than WebGPU and exceeds reasonable per-test budgets.

name: Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Marketing asset-ref check
        # Catches typo'd hrefs in marketing/*.html before they ship as 404s.
        run: npm run check:marketing
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Unit + E2E tests
        run: npm test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
