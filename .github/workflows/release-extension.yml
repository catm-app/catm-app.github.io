# Releases the catm Chrome extension.
#
# Triggers
#   • Test workflow on main completing successfully — gated on
#     `extension/manifest.json` version having actually bumped vs the
#     parent commit. Pushes that change the bundle without bumping ride
#     along with the next bump.
#   • Manual workflow_dispatch (skips the test-gate; intended for
#     re-uploading a known-good build).
#
# What it does (only if the version bumped)
#   • Builds extension/app/ via `npm run build`, zips it.
#   • Uploads the zip as a workflow artifact.
#   • Creates a GitHub Release tagged ext-v<version> with the zip attached.
#   • If CWS_* secrets are configured: uploads + publishes to the Chrome
#     Web Store via chrome-webstore-upload-cli.
#
# Secrets to add (Repo settings → Secrets and variables → Actions)
#   CWS_APP_ID         — extension ID from the Chrome Web Store dashboard
#   CWS_CLIENT_ID      — OAuth 2.0 client ID from Google Cloud Console
#   CWS_CLIENT_SECRET  — OAuth 2.0 client secret
#   CWS_REFRESH_TOKEN  — one-time OAuth refresh token; the setup flow is
#                        documented at
#                        https://github.com/fregante/chrome-webstore-upload-keys

name: Release extension

on:
  workflow_run:
    workflows: ['Test']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # to create GitHub releases

concurrency:
  group: release-extension
  cancel-in-progress: false  # never cancel an in-flight publish

jobs:
  guard:
    # Skip when the upstream Test workflow didn't succeed. Manual dispatch
    # has no workflow_run context; the first clause short-circuits.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.ver.outputs.bumped }}
      current: ${{ steps.ver.outputs.current }}
      sha: ${{ steps.ver.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run gives us the upstream commit; manual dispatch uses HEAD.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 2

      - name: Detect version bump
        id: ver
        run: |
          current=$(jq -r .version extension/manifest.json)
          sha=$(git rev-parse HEAD)
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          if git cat-file -e HEAD~1:extension/manifest.json 2>/dev/null; then
            previous=$(git show HEAD~1:extension/manifest.json | jq -r .version)
          else
            previous=""
          fi
          if [ "$current" != "$previous" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "Version bumped: ${previous:-<none>} → $current"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged ($current) — skipping release"
          fi

  release:
    needs: guard
    if: needs.guard.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.guard.outputs.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Validate background.js syntax
        run: node --check extension/background.js

      - name: Build extension app bundle
        # extension/app/ is gitignored; it has to be built before the zip
        # step or the artefact would ship without the React app.
        run: npm run build

      - name: Build extension.zip
        run: ./scripts/package-extension.sh

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-v${{ needs.guard.outputs.current }}-${{ needs.guard.outputs.sha }}
          path: extension.zip
          retention-days: 90

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="ext-v${{ needs.guard.outputs.current }}"
          gh release create "$tag" extension.zip \
            --title "Extension v${{ needs.guard.outputs.current }}" \
            --target "${{ needs.guard.outputs.sha }}" \
            --notes "Auto-built from ${{ needs.guard.outputs.sha }}. If CWS auto-publish is not configured, upload extension.zip to the Chrome Web Store dashboard manually."

      - name: Publish to Chrome Web Store
        env:
          CWS_APP_ID: ${{ secrets.CWS_APP_ID }}
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          if [ -z "${CWS_APP_ID:-}" ] || [ -z "${CWS_CLIENT_ID:-}" ] \
             || [ -z "${CWS_CLIENT_SECRET:-}" ] || [ -z "${CWS_REFRESH_TOKEN:-}" ]; then
            echo "::notice::CWS_* secrets not set — skipping auto-publish. The zip is attached to the GitHub Release; upload it via the Chrome Web Store dashboard."
            exit 0
          fi
          npx --yes chrome-webstore-upload-cli@3 upload \
            --source extension.zip \
            --extension-id "$CWS_APP_ID" \
            --client-id "$CWS_CLIENT_ID" \
            --client-secret "$CWS_CLIENT_SECRET" \
            --refresh-token "$CWS_REFRESH_TOKEN"
          npx --yes chrome-webstore-upload-cli@3 publish \
            --extension-id "$CWS_APP_ID" \
            --client-id "$CWS_CLIENT_ID" \
            --client-secret "$CWS_CLIENT_SECRET" \
            --refresh-token "$CWS_REFRESH_TOKEN"
